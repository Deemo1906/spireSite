<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spire</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <style>
      html, body { height: 100%; }

      .dashboard {
        min-height: 100vh;
        background: var(--bg-0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3rem 2rem;
        gap: 3rem;
      }

      .dash-header {
        text-align: center;
      }

      .dash-eyebrow {
        font-family: var(--font-heading);
        font-size: 0.62rem;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 0.75rem;
      }

      .dash-user {
        font-family: var(--font-display);
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 900;
        color: var(--text-0);
        text-shadow: 0 0 40px rgba(192,41,43,0.3);
      }

      .dash-rule {
        width: 40px;
        height: 2px;
        background: var(--red-500);
        margin: 1rem auto;
      }

      /* Navigation cards */
      .dash-nav {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        width: 100%;
        max-width: 700px;
      }

      .dash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        background: var(--bg-2);
        border: 1px solid var(--border);
        padding: 1.75rem 1.5rem;
        text-decoration: none;
        transition: border-color 0.2s, transform 0.2s;
        text-align: center;
        position: relative;
      }

      .dash-badge {
        position: absolute;
        top: -9px;
        right: 12px;
        background: var(--red-500);
        color: var(--text-0);
        font-family: var(--font-heading);
        font-size: 0.48rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        padding: 2px 8px;
      }

      .dash-card:hover {
        border-color: var(--border-red);
        transform: translateY(-4px);
      }

      .dash-card-icon {
        font-size: 1.5rem;
        color: var(--red-500);
      }

      .dash-card-label {
        font-family: var(--font-heading);
        font-size: 0.72rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--text-0);
      }

      .dash-card-sub {
        font-style: italic;
        font-size: 0.85rem;
        color: var(--text-2);
      }

      .dash-logout {
        font-family: var(--font-heading);
        font-size: 0.6rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--text-3);
        background: none;
        border: none;
        cursor: pointer;
        transition: color 0.2s;
      }

      .dash-logout:hover {
        color: var(--red-400);
      }
    </style>
  </head>

  <body>
    <div class="dashboard">

      <div class="dash-header">
        <p class="dash-eyebrow">Réseau Vermissien</p>
        <p class="dash-user" id="dashUser"></p>
        <div class="dash-rule"></div>
      </div>

      <nav class="dash-nav">
        <a class="dash-card" href="journals.html" id="pressCard">
          <span class="dash-card-icon">📰</span>
          <span class="dash-card-label">La Presse</span>
          <span class="dash-card-sub">Journaux de Spire</span>
        </a>
        <a class="dash-card" href="library.html" id="libCard">
          <span class="dash-card-icon">📚</span>
          <span class="dash-card-label">Bibliothèque</span>
          <span class="dash-card-sub">Œuvres & Archives</span>
        </a>
        <a class="dash-card" href="yul-library.html" id="yulCard" style="display:none;">
          <span class="dash-card-icon">🔒</span>
          <span class="dash-card-label">Collection Privée</span>
          <span class="dash-card-sub">Bibliothèque de Yul</span>
        </a>
        <a class="dash-card" href="speculation.html">
          <span class="dash-card-icon">🎲</span>
          <span class="dash-card-label">Spéculations</span>
          <span class="dash-card-sub">Qui vote pour qui ?</span>
        </a>
        <a class="dash-card" href="admin.html" id="adminCard" style="display:none;">
          <span class="dash-card-icon">⚙</span>
          <span class="dash-card-label">Administration</span>
          <span class="dash-card-sub">Connexions & Sessions</span>
        </a>
      </nav>

      <button class="dash-logout" id="logoutBtn">Se déconnecter</button>

    </div>

    <script src="js/read-tracker.js"></script>
    <script src="js/heartbeat.js"></script>
    <script>
      const API      = 'https://spiresite.onrender.com';
      const username = localStorage.getItem('spire_user');
      if (!localStorage.getItem('spire_token')) {
        window.location.href = 'connect.html';
      } else {
        document.getElementById('dashUser').textContent = username;
        if (['Yul', 'admin', 'mady'].includes(username)) {
          document.getElementById('yulCard').style.display = '';
        }
        if (username === 'admin') {
          document.getElementById('adminCard').style.display = '';
        }
      }

      document.getElementById('logoutBtn').addEventListener('click', async () => {
        const token     = localStorage.getItem('spire_token');
        const sessionId = localStorage.getItem('spire_session');
        if (token && sessionId) {
          try {
            await fetch(`${API}/api/sessions/end`, {
              method:  'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
              body:    JSON.stringify({ session_id: +sessionId }),
            });
          } catch (err) {
            console.error('[logout:session]', err.message);
          }
        }
        localStorage.removeItem('spire_token');
        localStorage.removeItem('spire_user');
        localStorage.removeItem('spire_session');
        window.location.href = 'index.html';
      });

      function isNew(dateStr) {
        return (new Date() - new Date(dateStr)) < 7 * 24 * 60 * 60 * 1000;
      }

      function addBadge(cardId) {
        const el = document.getElementById(cardId);
        if (!el) return;
        const badge = document.createElement('span');
        badge.className = 'dash-badge';
        badge.textContent = 'Nouveau';
        el.appendChild(badge);
      }

      fetch('journals/index.json')
        .then(r => r.json())
        .then(data => {
          if (data.papers.some(p => isNew(p.editions.at(-1).date))) addBadge('pressCard');
        })
        .catch(() => {});

      fetch('library/index.json')
        .then(r => r.json())
        .then(data => {
          if (data.books.some(b => isNew(b.added) && !isRead(b.slug))) addBadge('libCard');
        })
        .catch(() => {});
    </script>
  </body>
</html>
