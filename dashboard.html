<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Flèche — Spire</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <style>
      html, body { height: 100%; }

      .dashboard {
        min-height: 100vh;
        background: var(--bg-0);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3rem 2rem;
        gap: 3rem;
      }

      .dash-header {
        text-align: center;
      }

      .dash-eyebrow {
        font-family: var(--font-heading);
        font-size: 0.62rem;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 0.75rem;
      }

      .dash-user {
        font-family: var(--font-display);
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        font-weight: 900;
        color: var(--text-0);
        text-shadow: 0 0 40px rgba(192,41,43,0.3);
      }

      .dash-rule {
        width: 40px;
        height: 2px;
        background: var(--red-500);
        margin: 1rem auto;
      }

      /* Navigation cards */
      .dash-nav {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
        width: 100%;
        max-width: 700px;
      }

      .dash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        background: var(--bg-2);
        border: 1px solid var(--border);
        padding: 1.75rem 1.5rem;
        text-decoration: none;
        transition: border-color 0.2s, transform 0.2s;
        text-align: center;
      }

      .dash-card:hover {
        border-color: var(--border-red);
        transform: translateY(-4px);
      }

      .dash-card-icon {
        font-size: 1.5rem;
        color: var(--red-500);
      }

      .dash-card-label {
        font-family: var(--font-heading);
        font-size: 0.72rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--text-0);
      }

      .dash-card-sub {
        font-style: italic;
        font-size: 0.85rem;
        color: var(--text-2);
      }

      .dash-logout {
        font-family: var(--font-heading);
        font-size: 0.6rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--text-3);
        background: none;
        border: none;
        cursor: pointer;
        transition: color 0.2s;
      }

      .dash-logout:hover {
        color: var(--red-400);
      }
    </style>
  </head>

  <body>
    <div class="dashboard">

      <div class="dash-header">
        <p class="dash-eyebrow">Réseau Vermissien</p>
        <p class="dash-user" id="dashUser"></p>
        <div class="dash-rule"></div>
      </div>

      <nav class="dash-nav">
        <a class="dash-card" href="journals.html">
          <span class="dash-card-icon">📰</span>
          <span class="dash-card-label">La Presse</span>
          <span class="dash-card-sub">Journaux de la Flèche</span>
        </a>
        <!-- Future sections can be added here -->
      </nav>

      <button class="dash-logout" id="logoutBtn">Se déconnecter</button>

    </div>

    <script>
      const username = localStorage.getItem('spire_user');
      if (!localStorage.getItem('spire_token')) {
        window.location.href = 'connect.html';
      } else {
        document.getElementById('dashUser').textContent = username;
      }

      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('spire_token');
        localStorage.removeItem('spire_user');
        window.location.href = 'index.html';
      });
    </script>
  </body>
</html>
