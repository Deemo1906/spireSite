<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Presse — Spire</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=VT323&family=Special+Elite&family=Source+Serif+4:wght@700&family=UnifrakturMaguntia&family=Poiret+One&family=Oswald:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .journals-page {
        min-height: 100vh;
        background: var(--bg-0);
        padding: 5rem 2rem 6rem;
      }

      .journals-header { text-align: center; margin-bottom: 4rem; }
      .journals-eyebrow {
        font-family: var(--font-heading); font-size: 0.62rem;
        letter-spacing: 0.5em; text-transform: uppercase;
        color: var(--text-3); margin-bottom: 1rem;
      }
      .journals-title {
        font-family: var(--font-heading); font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase;
        color: var(--text-0); margin-bottom: 1rem;
      }
      .journals-rule { width: 48px; height: 2px; background: var(--red-500); margin: 0 auto 1.25rem; }
      .journals-sub { font-style: italic; color: var(--text-2); font-size: 1rem; }

      .kiosk {
        max-width: 1080px; margin: 0 auto;
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;
      }

      /* Wrapper for card + actions */
      .paper-entry { display: flex; flex-direction: column; gap: 0; }

      .paper-card {
        display: block; cursor: pointer; text-decoration: none;
        transition: transform 0.22s ease, box-shadow 0.22s ease;
        position: relative; flex: 1;
      }
      .paper-card:hover { transform: translateY(-5px); box-shadow: 0 18px 45px rgba(0,0,0,0.6); }

      /* NEW badge */
      .badge-new {
        position: absolute; top: -10px; right: 12px;
        background: var(--red-500); color: var(--text-0);
        font-family: var(--font-heading); font-size: 0.5rem;
        letter-spacing: 0.3em; text-transform: uppercase;
        padding: 2px 8px; z-index: 2;
      }

      /* Actions bar below each card */
      .paper-actions {
        display: flex; border-top: none;
      }

      .paper-action {
        flex: 1; padding: 0.6rem 0.5rem; text-align: center;
        font-family: var(--font-heading); font-size: 0.58rem;
        letter-spacing: 0.25em; text-transform: uppercase;
        text-decoration: none; cursor: pointer;
        transition: background 0.2s, color 0.2s;
        border: none; outline: none;
      }

      .action-read {
        background: var(--bg-3); color: var(--text-1);
        border-right: 1px solid var(--border);
      }
      .action-read:hover { background: var(--red-700); color: var(--text-0); }

      .action-archive {
        background: var(--bg-2); color: var(--text-3);
      }
      .action-archive:hover { background: var(--bg-3); color: var(--text-2); }

      .back-link {
        position: fixed; top: 1.5rem; left: 2rem;
        font-family: var(--font-heading); font-size: 0.65rem;
        letter-spacing: 0.35em; text-transform: uppercase;
        color: var(--text-3); transition: color 0.2s; z-index: 10;
        text-decoration: none;
      }
      .back-link:hover { color: var(--text-1); }

      /* ── CARD STYLES ──────────────────────────────── */

      /* AMBROSIA */
      .card-ambrosia {
        background: #f7f0e3; border: 1px solid #8a6a3a;
        padding: 1.5rem 1.25rem; text-align: center; position: relative;
      }
      .card-ambrosia::before {
        content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
        border: 1px solid #c4a06a; pointer-events: none;
      }
      .card-ambrosia::after {
        content: '✦  ✦  ✦'; position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
        font-size: 7pt; color: #8a6a3a; letter-spacing: 6px; background: #f7f0e3; padding: 0 4px;
      }
      .ambrosia-name { font-family: 'Cinzel Decorative', serif; font-size: 2rem; color: #3a1f00; line-height: 1; margin: 1rem 0 0.4rem; }
      .ambrosia-rule { border: none; border-top: 1px solid #8a6a3a; margin: 0.4rem auto; width: 60%; }
      .ambrosia-tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.8rem; color: #5a3a10; letter-spacing: 1px; }
      .ambrosia-edition { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 3px; color: #8a6a3a; text-transform: uppercase; margin-top: 0.75rem; }

      /* LIBERATE */
      .card-liberate {
        background: #f0ebe0; border: 3px solid #111; padding: 1.25rem 1rem; text-align: center;
        transform: rotate(-0.6deg); position: relative; box-shadow: 3px 3px 0 #555;
      }
      .paper-card:hover .card-liberate { transform: none; }
      .card-liberate::before {
        content: ''; position: absolute; top: 3px; left: 3px; right: 3px; bottom: 3px;
        border: 1px solid #333; pointer-events: none;
      }
      .liberate-top { font-family: 'Special Elite', cursive; font-size: 0.55rem; letter-spacing: 2px; color: #555; margin-bottom: 0.4rem; }
      .liberate-name { font-family: 'VT323', monospace; font-size: 3.5rem; line-height: 0.95; color: #111; letter-spacing: -1px; }
      .liberate-excl { color: #8a0000; }
      .liberate-band { background: #111; color: #f0ebe0; font-family: 'Special Elite', cursive; font-size: 0.5rem; letter-spacing: 3px; padding: 2px 0; margin: 0.4rem 0; }
      .liberate-tagline { font-family: 'Courier Prime', monospace; font-size: 0.65rem; font-style: italic; color: #333; }

      /* CHRONICLE */
      .card-chronicle {
        background: #f9f8f5; padding: 1.25rem;
        border-top: 4px solid #0d0d0d; border-bottom: 2px solid #0d0d0d;
        border-left: 1px solid #ccc; border-right: 1px solid #ccc;
      }
      .chronicle-meta { display: flex; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 0.5rem; color: #888; margin-bottom: 0.5rem; }
      .chronicle-name { font-family: 'Source Serif 4', serif; font-size: 1.75rem; font-weight: 700; color: #0d0d0d; letter-spacing: 1px; border-bottom: 2px solid #0d0d0d; padding-bottom: 0.4rem; margin-bottom: 0.4rem; }
      .chronicle-sub { font-family: 'Source Serif 4', serif; font-size: 0.7rem; font-style: italic; color: #555; letter-spacing: 1px; }
      .chronicle-edition { font-family: 'Space Mono', monospace; font-size: 0.5rem; color: #888; margin-top: 0.75rem; letter-spacing: 1px; }

      /* FURNACE */
      .card-furnace { background: #faf6ee; border: 1px solid #bbb; padding: 1.25rem; text-align: center; }
      .furnace-top { display: flex; justify-content: space-between; font-size: 0.55rem; font-style: italic; color: #666; margin-bottom: 0.4rem; }
      .furnace-name { font-family: 'UnifrakturMaguntia', serif; font-size: 2.6rem; line-height: 1; color: #0d0d0d; }
      .furnace-rule-double { border: none; border-top: 3px double #1a1a1a; margin: 0.4rem 0; }
      .furnace-banner { background: #1a1a1a; color: #faf6ee; font-family: 'Playfair Display', serif; font-size: 0.55rem; letter-spacing: 3px; text-transform: uppercase; padding: 2px 0; }
      .furnace-tagline { font-family: 'IM Fell English', serif; font-style: italic; font-size: 0.7rem; color: #444; margin-top: 0.4rem; letter-spacing: 1px; }

      /* SILHOUETTE */
      .card-silhouette { background: #fafafa; padding: 1.5rem 1.25rem; text-align: center; border-top: 3px solid #1c1c1c; border-bottom: 1px solid #1c1c1c; border-left: none; border-right: none; }
      .silhouette-top-rule { border: none; border-top: 1px solid #1c1c1c; margin-bottom: 2px; }
      .silhouette-meta { display: flex; justify-content: space-between; font-family: 'Raleway', sans-serif; font-size: 0.5rem; letter-spacing: 3px; text-transform: uppercase; color: #aaa; margin-bottom: 0.6rem; }
      .silhouette-name { font-family: 'Poiret One', sans-serif; font-size: 1.9rem; letter-spacing: 10px; color: #1c1c1c; text-transform: uppercase; line-height: 1; }
      .silhouette-deco { display: flex; align-items: center; gap: 8px; margin: 0.5rem 0; }
      .silhouette-deco hr { flex: 1; border: none; border-top: 1px solid #ddd; }
      .silhouette-deco span { font-family: 'Raleway', sans-serif; font-size: 0.45rem; letter-spacing: 4px; text-transform: uppercase; color: #aaa; white-space: nowrap; }
      .silhouette-tagline { font-family: 'Raleway', sans-serif; font-weight: 300; font-style: italic; font-size: 0.65rem; letter-spacing: 3px; color: #777; text-transform: uppercase; }

      /* TORCH */
      .card-torch { background: #f4f1ec; padding: 0; border: 1px solid #888; overflow: hidden; }
      .torch-banner { background: #0f0f0f; color: #f4f1ec; font-family: 'Oswald', sans-serif; font-size: 0.55rem; letter-spacing: 4px; text-transform: uppercase; padding: 4px 1rem; text-align: center; }
      .torch-body { padding: 0.75rem 1rem 1rem; text-align: center; }
      .torch-name-row { display: flex; align-items: center; justify-content: center; gap: 10px; border-top: 1px solid #0f0f0f; border-bottom: 4px solid #0f0f0f; padding: 6px 0; }
      .torch-icon { font-size: 1.5rem; line-height: 1; }
      .torch-name { font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #0f0f0f; line-height: 1; }
      .torch-tagline { font-family: 'Roboto Condensed', sans-serif; font-size: 0.6rem; font-style: italic; color: #555; letter-spacing: 1px; margin-top: 0.5rem; }
      .torch-edition { font-family: 'Roboto Condensed', sans-serif; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-top: 0.4rem; }

      @media (max-width: 900px) { .kiosk { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 580px) { .kiosk { grid-template-columns: 1fr; } }
    </style>
  </head>

  <body style="overflow: auto;">
    <a href="dashboard.html" class="back-link">← Retour</a>

    <div class="journals-page">
      <div class="journals-header">
        <p class="journals-eyebrow">Archives de la Flèche</p>
        <h1 class="journals-title">La Presse</h1>
        <div class="journals-rule"></div>
        <p class="journals-sub">Les publications de la Flèche — officielles, clandestines, et tout ce qui est entre les deux.</p>
      </div>

      <div class="kiosk" id="kiosk"></div>
    </div>

    <script>
      if (!localStorage.getItem('spire_token')) {
        window.location.href = 'connect.html';
      }

      function isNew(dateStr) {
        const pub = new Date(dateStr);
        const now = new Date();
        return (now - pub) < 7 * 24 * 60 * 60 * 1000;
      }

      function cardHTML(paper) {
        const latest = paper.editions.at(-1);
        const editionLabel = `Édition N°${latest.number}`;

        const templates = {
          ambrosia: `
            <div class="card-ambrosia">
              <p class="ambrosia-name">${paper.name}</p>
              <hr class="ambrosia-rule"/>
              <p class="ambrosia-tagline">${paper.tagline}</p>
              <p class="ambrosia-edition">${editionLabel}</p>
            </div>`,

          liberate: `
            <div class="card-liberate">
              <p class="liberate-top">presse libre — non censurée</p>
              <p class="liberate-name">Liberate<span class="liberate-excl">!</span></p>
              <div class="liberate-band">journal clandestin de résistance</div>
              <p class="liberate-tagline">${paper.tagline}</p>
            </div>`,

          chronicle: `
            <div class="card-chronicle">
              <div class="chronicle-meta"><span>La Flèche</span><span>${editionLabel}</span></div>
              <p class="chronicle-name">${paper.name}</p>
              <p class="chronicle-sub">${paper.tagline}</p>
              <p class="chronicle-edition">// données — faits — rapports</p>
            </div>`,

          furnace: `
            <div class="card-furnace">
              <div class="furnace-top"><span>La Flèche</span><span>${editionLabel}</span></div>
              <p class="furnace-name">${paper.name}</p>
              <hr class="furnace-rule-double"/>
              <div class="furnace-banner">Voix des Profondeurs</div>
              <p class="furnace-tagline">${paper.tagline}</p>
            </div>`,

          silhouette: `
            <div class="card-silhouette">
              <div class="silhouette-meta"><span>La Flèche</span><span>No. ${latest.number}</span></div>
              <hr class="silhouette-top-rule"/>
              <p class="silhouette-name">${paper.name}</p>
              <div class="silhouette-deco"><hr/><span>société &amp; culture</span><hr/></div>
              <p class="silhouette-tagline">${paper.tagline}</p>
            </div>`,

          torch: `
            <div class="card-torch">
              <div class="torch-banner">Organe du Peuple de la Flèche</div>
              <div class="torch-body">
                <div class="torch-name-row">
                  <span class="torch-icon">🔥</span>
                  <span class="torch-name">${paper.name}</span>
                </div>
                <p class="torch-tagline">${paper.tagline}</p>
                <p class="torch-edition">${editionLabel}</p>
              </div>
            </div>`,
        };

        const badge = isNew(latest.date) ? `<span class="badge-new">Nouveau</span>` : '';
        const archiveCount = paper.editions.length;

        return `
          <div class="paper-entry">
            <a class="paper-card" href="journals/${latest.file}" target="_blank">
              ${badge}
              ${templates[paper.style] ?? `<div style="padding:2rem;color:#333">${paper.name}</div>`}
            </a>
            <div class="paper-actions">
              <a class="paper-action action-read" href="journals/${latest.file}" target="_blank">Lire</a>
              <a class="paper-action action-archive" href="archive.html?paper=${paper.id}">
                Archives (${archiveCount})
              </a>
            </div>
          </div>`;
      }

      fetch('journals/index.json')
        .then(r => r.json())
        .then(data => {
          document.getElementById('kiosk').innerHTML = data.papers.map(cardHTML).join('');
        })
        .catch(err => {
          console.error('[journals]', err);
          document.getElementById('kiosk').innerHTML = '<p style="color:var(--text-2);text-align:center">Impossible de charger la presse.</p>';
        });
    </script>
  </body>
</html>
