<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Identifiez-vous — Spire</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="connect.css" />
  </head>

  <body class="connect-page">

    <a href="index.html" class="back-link" aria-label="Retourner à l'accueil">
      ← Retour
    </a>

    <main class="connect-main">

      <div class="connect-bg" aria-hidden="true"></div>

      <div class="connect-panel">

        <div class="connect-header">
          <p class="connect-eyebrow">Canal Sécurisé Vermissien</p>
          <h1 class="connect-title">IDENTIFIEZ-<br/>VOUS</h1>
          <div class="connect-rule" aria-hidden="true"></div>
          <p class="connect-sub">
            L'accès au réseau est restreint.<br />
            Déclinez votre identité et votre mot de passe.
          </p>
        </div>

        <form class="connect-form" id="loginForm" novalidate>

          <div class="field">
            <label class="field-label" for="username">Nom d'Opérative</label>
            <input
              class="field-input"
              type="text"
              id="username"
              name="username"
              placeholder="Qui êtes-vous ?"
              autocomplete="username"
              required
            />
          </div>

          <div class="field">
            <label class="field-label" for="password">Phrase de Passe</label>
            <input
              class="field-input"
              type="password"
              id="password"
              name="password"
              placeholder="Ce qui fut dit dans l'obscurité."
              autocomplete="current-password"
              required
            />
          </div>

          <p class="connect-error" id="errorMsg" aria-live="polite"></p>

          <button class="connect-submit" type="submit" id="submitBtn">
            <span>Entrer dans Spire</span>
          </button>

        </form>

        <p class="connect-warning">
          Si vous n'avez pas d'identifiants, vous n'étiez pas attendu.<br/>
          Fermez ce canal et oubliez l'avoir trouvé.
        </p>

      </div>
    </main>

    <script>
      // Replace with your Render URL once deployed
      const API = 'https://spiresite.onrender.com';

      const form      = document.getElementById('loginForm');
      const errorMsg  = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.textContent = '';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          errorMsg.textContent = 'Veuillez remplir tous les champs.';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.querySelector('span').textContent = 'Vérification…';

        try {
          const res = await fetch(`${API}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            errorMsg.textContent = data.error ?? 'Erreur inconnue.';
            return;
          }

          // Store session token and redirect to the main site
          localStorage.setItem('spire_token', data.token);
          localStorage.setItem('spire_user', data.username);
          window.location.href = 'dashboard.html';

        } catch (err) {
          console.error('[login]', err);
          errorMsg.textContent = 'Impossible de joindre le serveur. Réessayez.';
        } finally {
          submitBtn.disabled = false;
          submitBtn.querySelector('span').textContent = 'Entrer dans Spire';
        }
      });
    </script>

  </body>
</html>
