<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bibliothèque — Spire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .library-page {
        min-height: 100vh;
        background: var(--bg-0);
        padding: 5rem 2rem 6rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .back-link {
        position: fixed; top: 1.5rem; left: 2rem;
        font-family: var(--font-heading); font-size: 0.65rem;
        letter-spacing: 0.35em; text-transform: uppercase;
        color: var(--text-3); transition: color 0.2s; z-index: 10;
        text-decoration: none;
      }
      .back-link:hover { color: var(--text-1); }

      .library-header {
        text-align: center;
        margin-bottom: 4rem;
      }
      .library-eyebrow {
        font-family: var(--font-heading); font-size: 0.62rem;
        letter-spacing: 0.5em; text-transform: uppercase;
        color: var(--text-3); margin-bottom: 1rem;
      }
      .library-title {
        font-family: var(--font-heading); font-size: clamp(1.4rem, 4vw, 2.2rem);
        font-weight: 600; letter-spacing: 0.28em; text-transform: uppercase;
        color: var(--text-0); margin-bottom: 1rem;
      }
      .library-rule {
        width: 48px; height: 2px;
        background: var(--red-500); margin: 0 auto;
      }

      /* Author cards grid */
      .authors-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.5rem;
        width: 100%;
        max-width: 860px;
      }

      .author-card {
        display: grid;
        grid-template-columns: 80px 1fr;
        gap: 1.5rem;
        align-items: center;
        background: var(--bg-2);
        border: 1px solid var(--border);
        padding: 1.75rem;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.2s, transform 0.2s;
        position: relative;
      }

      .badge-new {
        position: absolute;
        top: -9px; right: 12px;
        background: var(--red-500); color: var(--text-0);
        font-family: var(--font-heading); font-size: 0.48rem;
        letter-spacing: 0.3em; text-transform: uppercase;
        padding: 2px 8px;
      }
      .author-card:hover {
        border-color: var(--border-red);
        transform: translateY(-3px);
      }

      .author-sigil {
        width: 80px; height: 80px;
        background: var(--bg-3);
        border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Cinzel Decorative', serif;
        font-size: 2rem; color: var(--red-700);
        position: relative; flex-shrink: 0;
      }
      .author-sigil::before {
        content: '';
        position: absolute; inset: 5px;
        border: 1px solid var(--border);
        pointer-events: none;
      }

      .author-info {}
      .author-label {
        font-family: var(--font-heading); font-size: 0.55rem;
        letter-spacing: 0.45em; text-transform: uppercase;
        color: var(--text-3); margin-bottom: 0.35rem;
      }
      .author-name {
        font-family: 'Cinzel Decorative', serif;
        font-size: 0.95rem; color: var(--text-0);
        line-height: 1.4; margin-bottom: 0.6rem;
      }
      .author-works {
        font-style: italic; font-size: 0.82rem; color: var(--text-3);
      }
    </style>
  </head>

  <body style="overflow: auto;">
    <a href="dashboard.html" class="back-link">← Retour</a>

    <div class="library-page">
      <div class="library-header">
        <p class="library-eyebrow">Archives de la Flèche</p>
        <h1 class="library-title">Bibliothèque</h1>
        <div class="library-rule"></div>
      </div>

      <div class="authors-grid">
        <a class="author-card" href="authors/simon.html" data-author="simon">
          <div class="author-sigil">S</div>
          <div class="author-info">
            <p class="author-label">Auteur</p>
            <p class="author-name">Simon Verlat</p>
            <p class="author-works">3 carnets disponibles</p>
          </div>
        </a>
        <a class="author-card" href="authors/nereth.html" data-author="nereth">
          <div class="author-sigil">N</div>
          <div class="author-info">
            <p class="author-label">Auteur</p>
            <p class="author-name">Nereth-Qui-Écrit-Dans-le-Noir</p>
            <p class="author-works">3 ouvrages disponibles</p>
          </div>
        </a>
      </div>
    </div>

    <script src="js/read-tracker.js"></script>
    <script>
      if (!localStorage.getItem('spire_token')) {
        window.location.href = 'connect.html';
      }

      function isNew(dateStr) {
        return (new Date() - new Date(dateStr)) < 7 * 24 * 60 * 60 * 1000;
      }

      fetch('library/index.json')
        .then(r => r.json())
        .then(data => {
          const newByAuthor = {};
          data.books.forEach(b => {
            if (isNew(b.added) && !isRead(b.slug)) newByAuthor[b.author] = true;
          });
          document.querySelectorAll('[data-author]').forEach(card => {
            if (newByAuthor[card.dataset.author]) {
              const badge = document.createElement('span');
              badge.className = 'badge-new';
              badge.textContent = 'Nouveau';
              card.appendChild(badge);
            }
          });
        })
        .catch(() => {});
    </script>
  </body>
</html>
