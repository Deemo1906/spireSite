<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archives — Spire</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,400&family=VT323&family=Special+Elite&family=Source+Serif+4:wght@700&family=UnifrakturMaguntia&family=Poiret+One&family=Oswald:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .archive-page {
        min-height: 100vh;
        background: var(--bg-0);
        padding: 5rem 2rem 6rem;
        max-width: 780px;
        margin: 0 auto;
      }

      .back-link {
        position: fixed; top: 1.5rem; left: 2rem;
        font-family: var(--font-heading); font-size: 0.65rem;
        letter-spacing: 0.35em; text-transform: uppercase;
        color: var(--text-3); transition: color 0.2s; z-index: 10;
        text-decoration: none;
      }
      .back-link:hover { color: var(--text-1); }

      /* Paper banner header — inherits the paper's identity */
      .archive-banner {
        margin-bottom: 3rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border);
      }

      .archive-paper-name {
        font-family: var(--font-heading);
        font-size: clamp(1.5rem, 6vw, 2.8rem);
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-0);
        margin-bottom: 0.5rem;
      }

      .archive-paper-tagline {
        font-style: italic;
        color: var(--text-2);
        font-size: 1rem;
      }

      .archive-count {
        font-family: var(--font-heading);
        font-size: 0.6rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-top: 1rem;
      }

      /* Edition list */
      .edition-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .edition-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-2);
        border: 1px solid var(--border);
        padding: 1.25rem 1.5rem;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.2s, transform 0.18s;
        gap: 1.5rem;
      }

      .edition-row:hover {
        border-color: var(--border-red);
        transform: translateX(4px);
      }

      .edition-row.is-latest {
        border-left: 3px solid var(--red-500);
      }

      .edition-info { flex: 1; }

      .edition-number {
        font-family: var(--font-heading);
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--text-0);
        margin-bottom: 0.25rem;
      }

      .edition-date {
        font-style: italic;
        font-size: 0.85rem;
        color: var(--text-2);
      }

      .edition-badge-new {
        font-family: var(--font-heading);
        font-size: 0.5rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        background: var(--red-500);
        color: var(--text-0);
        padding: 2px 8px;
        white-space: nowrap;
      }

      .edition-arrow {
        font-family: var(--font-heading);
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        color: var(--text-3);
        transition: color 0.2s;
      }

      .edition-row:hover .edition-arrow { color: var(--red-400); }

      .empty-state {
        text-align: center;
        font-style: italic;
        color: var(--text-3);
        padding: 4rem 0;
      }
    </style>
  </head>

  <body style="overflow: auto;">
    <a href="journals.html" class="back-link">← La Presse</a>

    <div class="archive-page">
      <div class="archive-banner" id="banner"></div>
      <div class="edition-list" id="editionList"></div>
    </div>

    <script>
      if (!localStorage.getItem('spire_token')) {
        window.location.href = 'connect.html';
      }

      function isNew(dateStr) {
        const pub = new Date(dateStr);
        const now = new Date();
        return (now - pub) < 7 * 24 * 60 * 60 * 1000;
      }

      function formatDate(dateStr) {
        return new Date(dateStr).toLocaleDateString('fr-FR', {
          day: 'numeric', month: 'long', year: 'numeric'
        });
      }

      const paperId = new URLSearchParams(location.search).get('paper');

      if (!paperId) {
        window.location.href = 'journals.html';
      }

      fetch('journals/index.json')
        .then(r => r.json())
        .then(data => {
          const paper = data.papers.find(p => p.id === paperId);

          if (!paper) {
            window.location.href = 'journals.html';
            return;
          }

          document.title = `${paper.name} — Archives`;

          // Banner
          document.getElementById('banner').innerHTML = `
            <p class="archive-count">Archives</p>
            <h1 class="archive-paper-name">${paper.name}</h1>
            <p class="archive-paper-tagline">${paper.tagline}</p>
            <p class="archive-count">${paper.editions.length} édition${paper.editions.length > 1 ? 's' : ''}</p>
          `;

          // Edition list — newest first
          const sorted = [...paper.editions].reverse();

          if (sorted.length === 0) {
            document.getElementById('editionList').innerHTML =
              `<p class="empty-state">Aucune édition disponible.</p>`;
            return;
          }

          document.getElementById('editionList').innerHTML = sorted.map((ed, i) => {
            const latest = i === 0;
            const fresh = isNew(ed.date);
            return `
              <a class="edition-row ${latest ? 'is-latest' : ''}"
                 href="journals/${ed.file}" target="_blank">
                <div class="edition-info">
                  <p class="edition-number">Édition N°${ed.number}</p>
                  <p class="edition-date">${formatDate(ed.date)}</p>
                </div>
                ${fresh ? `<span class="edition-badge-new">Nouveau</span>` : ''}
                <span class="edition-arrow">Lire →</span>
              </a>`;
          }).join('');
        })
        .catch(err => {
          console.error('[archive]', err);
        });
    </script>
  </body>
</html>
